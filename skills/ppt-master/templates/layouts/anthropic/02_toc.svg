            <text x="130" y="280" font-size="20" font-weight="600" fill="#1A1A2E">{{TOC_ITEM_2_TITLE}}</text>
            <text x="130" y="303" font-size="16" fill="#64748B">{{TOC_ITEM_2_DESC}}</text>
        </g>
        
        
        <g>
