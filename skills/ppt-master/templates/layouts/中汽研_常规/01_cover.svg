<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
    

    
    <image href="../images/{{COVER_BG_IMAGE}}" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice" />

    
    <rect x="0" y="0" width="1280" height="720" fill="#001F4D" fill-opacity="0.4" />

    
    <rect x="0" y="0" width="1280" height="4" fill="#FFFFFF" fill-opacity="0.3" />

    
    <image href="../images/{{LOGO_LARGE}}" x="344" y="120" width="592" height="238" preserveAspectRatio="xMidYMid meet" />

    
    <text x="640" y="440" text-anchor="middle" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">
        {{TITLE}}
    </text>

    
    <text x="640" y="500" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" fill="#FFFFFF" fill-opacity="0.85">
        {{SUBTITLE}}
    </text>

    
    <line x1="440" y1="540" x2="840" y2="540" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.4" />

    
    <text x="640" y="590" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#FFFFFF" fill-opacity="0.9">
        {{AUTHOR}}
    </text>

    
    <text x="640" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.7">
        {{AUTHOR_EN}}
    </text>

    
    </svg>