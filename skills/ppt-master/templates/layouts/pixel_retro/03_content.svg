<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  
  
  
  <defs>
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  
  <rect width="1280" height="720" fill="#0D1117" />
  
  
  <rect x="0" y="0" width="1280" height="4" fill="#39FF14" fill-opacity="0.6" />
  
  
  <text x="60" y="70" font-family="Consolas, Monaco, monospace" font-size="36" font-weight="bold" fill="#39FF14" filter="url(#glowGreen)">
    {{PAGE_TITLE}}
  </text>
  <text x="60" y="100" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Microsoft YaHei, sans-serif" font-size="18" fill="#8B949E">
    {{PAGE_TITLE_EN}}
  </text>
  
  
  <rect x="60" y="120" width="200" height="2" fill="#30363D" />
  
  
  
  
  
  
  <rect x="60" y="140" width="1160" height="500" fill="none" stroke="#30363D" stroke-width="2" stroke-dasharray="8,8" />
  <text x="640" y="405" text-anchor="middle" font-family="Consolas, monospace" font-size="20" fill="#8B949E">
    {{CONTENT_AREA}}
  </text>
  
  
  </svg>